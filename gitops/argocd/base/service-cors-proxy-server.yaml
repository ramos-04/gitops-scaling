# Example LoadBalancer Service for your CORS proxy
apiVersion: v1
kind: Service
metadata:
  name: python-cors-proxy-loadbalancer
  labels:
    app: python-cors-proxy
spec:
  type: LoadBalancer # This is the key
  selector:
    app: python-cors-proxy # Must match the 'app' label on your proxy pods
  ports:
    - protocol: TCP
      port: 80 # The port clients will connect to on the load balancer
      targetPort: 8080 # The port your proxy container is listening on
