apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    metadata:
      labels:
         # custom label to identify the karpenter nodes
         workload-type: karpenter-exclusive
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: topology.kubernetes.io/zone
          operator: In
          values:
            - eu-north-1a # High availability across AZs
            - eu-north-1b
            - eu-north-1c
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: "node.kubernetes.io/instance-type" 
          operator: In
          values: ["m5.large"] # t3.micro free tier supported
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      taints:
        - key: "workload.k8s.io/karpenter-exclusive-app"
          effect: "NoSchedule"

          # Optional: You can add a value if needed, e.g., value: "dedicated"
      expireAfter: 720h # 30 * 24h = 720h
  limits:
    cpu: 20
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: "KarpenterNodeRole-gitops-eks-cluster" # replace with your cluster name
  amiSelectorTerms:
    - alias: "al2023@v20250704"
  blockDeviceMappings:
    - deviceName: /dev/xvda # Standard device name for the root volume on Linux AMIs
      ebs:
        volumeSize: 200Gi # Desired root volume size in GiB 
        volumeType: gp3 # Recommended volume type for better performance/cost control
        iops: 3000      # Recommended default IOPS for gp3 (min is 3000)
        throughput: 125 # Recommended default Throughput for gp3 (min is 125)
        deleteOnTermination: true # Usually true for ephemeral nodes
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "gitops-eks-cluster" # replace with your cluster name
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "gitops-eks-cluster" # replace with your cluster name
